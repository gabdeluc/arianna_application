# pytest.ini - Configurazione PyTest Ottimizzata

[pytest]
# Cartella test
testpaths = tests

# Pattern file test
python_files = test_*.py

# Pattern funzioni test
python_functions = test_*

# Supporto async
asyncio_mode = auto

# Opzioni default
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider
    --color=yes

# Markers personalizzati
markers =
    unit: Test unitari (veloci)
    integration: Test integrazione (lenti)
    api: Test endpoint API
    sentiment: Test sentiment analysis
    toxicity: Test toxicity detection
    slow: Test lenti (>1s)
    
# Timeout per test (evita hang)
timeout = 30

# Coverage settings
[coverage:run]
source = .
omit = 
    tests/*
    venv/*
    .venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False